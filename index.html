<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="q0osLpjuSRp4ooRUfcbcg38OcjcWynNNNlCu1UTsSIY">
    <title>WT2 Wiki Lab | Wild Terra 2 New Lands Wiki</title>
    <meta name="description" content="WT2 Wiki Lab is a Wild Terra 2 wiki and Wild Terra 2 New Lands wiki for crafting recipes, items, monsters, maps, fishing, farming, pets, shops, and prices.">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "WT2 Wiki Lab",
        "alternateName": [
          "WT2 Wiki",
          "Wild Terra 2 wiki",
          "Wild Terra 2 New Lands wiki"
        ]
      }
    </script>
  <link rel="stylesheet" href="styles.css?v=20260710-poison-mixer">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Search">
        <div class="brand">
            <div class="mark">
              <img class="brand-logo" src="assets/brand/wt2-logo.png?v=20260707-1148" alt="" aria-hidden="true">
            </div>
          <div>
            <h1>WT2 Wiki Lab</h1>
            <p>Recipes, wiki, and local game data</p>
          </div>
        </div>

        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Item, recipe, monster, map, NPC shop...">
        </label>

        <div class="filters unified-filters" id="recipeFilters">
          <button class="filter-button is-active" data-kind="all" type="button">All</button>
          <button class="filter-button" data-kind="items" type="button">Items</button>
          <button class="filter-button" data-kind="craft" type="button">Craft</button>
          <button class="filter-button" data-kind="build" type="button">Build</button>
          <button class="filter-button" data-kind="process" type="button">Process</button>
          <button class="filter-button" data-kind="cooking" type="button">Cooking</button>
          <button class="filter-button" data-kind="potion" type="button">Potions</button>
          <button class="filter-button" data-kind="poison" type="button">Poisons</button>
          <button class="filter-button" data-kind="sell" type="button">Sell</button>
        </div>

        <div class="filters wiki-filters" id="wikiFilters">
          <button class="wiki-filter-button" data-wiki-kind="creature" type="button">Monsters</button>
          <button class="wiki-filter-button" data-wiki-kind="area" type="button">Maps</button>
          <button class="wiki-filter-button" data-wiki-kind="fish" type="button">Fishing</button>
          <button class="wiki-filter-button" data-wiki-kind="shop" type="button">Shops</button>
          <button class="wiki-filter-button" data-wiki-kind="skill" type="button">Skills</button>
          <button class="wiki-filter-button" data-wiki-kind="farming" type="button">Farming</button>
          <button class="wiki-filter-button" data-wiki-kind="pet" type="button">Pets</button>
        </div>

        <div class="result-meta" id="resultMeta"></div>
        <div class="result-list" id="resultList" aria-live="polite"></div>
      </aside>

      <main class="workspace">
        <section class="recipe-stage" aria-label="Recipe">
          <div class="stage-header">
            <div>
              <p class="eyeline" id="recipeKind">Craft</p>
              <h2 id="recipeTitle">Choose a recipe</h2>
            </div>
            <div class="stage-actions">
              <button id="backButton" class="icon-command" type="button" title="Back">‹</button>
              <button id="homeButton" class="icon-command" type="button" title="Home">⌂</button>
            </div>
          </div>

          <div class="recipe-details" id="recipeDetails"></div>
          <div class="formula-board" id="formulaBoard"></div>
        </section>

        <aside class="inspector" aria-label="Item details">
          <div class="inspector-empty" id="emptyInspector">
            <h2>Select an item</h2>
            <p>See recipes, sources, prices, monsters, maps, fishing data, and shops.</p>
          </div>
          <div class="inspector-content is-hidden" id="inspectorContent"></div>
        </aside>
      </main>
    </div>

    <script src="data/app-data.js?v=20260708-2015"></script>
    <script src="data/wiki-data.js?v=20260709-1010"></script>
  <script src="app.js?v=20260710-poison-mixer"></script>
  </body>
</html>
